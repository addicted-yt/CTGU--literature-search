<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTGU 学术加速器 | 实验室专用</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #7c3aed;
            --bg: #0f172a;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h2 {
            margin-top: 0;
            font-size: 28px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            letter-spacing: 1px;
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 8px; margin-left: 5px; }
        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }
        .chips { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .chip {
            font-size: 11px;
            background: #334155;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .chip:hover { background: var(--primary); }
        
        .actions { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 30px; }
        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-campus { background: var(--primary); color: white; }
        .btn-vpn { background: white; color: #1e293b; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        button:active { transform: translateY(0); }

        footer { text-align: center; margin-top: 25px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h2>Academic Rocket</h2>
    
    <div class="input-group">
        <label>统一身份认证 (学号)</label>
        <input type="text" id="uid" placeholder="202XXXXXXXX">
    </div>

    <div class="input-group">
        <label>认证密码</label>
        <div style="position: relative;">
            <input type="password" id="pwd" placeholder="••••••••" style="padding-right: 60px;">
            <button type="button" onclick="togglePwd()" style="position:absolute; right:6px; top:50%; transform:translateY(-50%); padding:6px 10px; font-size:12px; border-radius:8px; border:none; background:#1e293b; color:#e5e7eb; cursor:pointer;">
                显示
            </button>
        </div>
    </div>

    <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 25px 0;"></div>

    <div class="input-group">
        <label>关键词 (中/英)</label>
        <input type="text" id="kw_cn" placeholder="中文搜索词" style="margin-bottom: 10px;">
        <input type="text" id="kw_en" placeholder="English Keywords">
        <div class="chips">
            <span class="chip" onclick="setKW('吸波材料','absorbing material')"># 吸波材料</span>
            <span class="chip" onclick="setKW('隐身技术','stealth technology')"># 隐身技术</span>
            <span class="chip" onclick="setKW('超材料','metamaterials')"># 超材料</span>
        </div>
    </div>

    <div class="input-group">
        <label>抓取论文条数 (1~20)</label>
        <input type="number" id="limit" min="1" max="20" placeholder="输入1~20之间的数字">
    </div>

    <div class="actions">
        <button class="btn-campus" onclick="launch('both')">🔄 知网 + 爱思唯尔</button>
        <button class="btn-campus" onclick="launch('cnki')">📚 仅知网</button>
        <button class="btn-campus" onclick="launch('sd')">🌍 仅爱思唯尔</button>
    </div>

    <footer>
        使用前请确保油猴脚本已激活<br>
        yt with ai Powering ©all rights reserved
    </footer>
</div>

<script>
    function setKW(cn, en) {
        document.getElementById('kw_cn').value = cn;
        document.getElementById('kw_en').value = en;
    }

    function togglePwd() {
        const inp = document.getElementById('pwd');
        const btn = event.currentTarget;
        if (inp.type === 'password') {
            inp.type = 'text';
            btn.innerText = '隐藏';
        } else {
            inp.type = 'password';
            btn.innerText = '显示';
        }
    }

    function launch(mode) {
        const u = document.getElementById('uid').value;
        const p = document.getElementById('pwd').value;
        const cn = document.getElementById('kw_cn').value;
        const en = document.getElementById('kw_en').value;
        const limitRaw = document.getElementById('limit').value.trim();

        if (!u || !p) {
            alert("请先填写学号和密码，同学！");
            return;
        }

        let limit = 10;
        if (limitRaw) {
            const n = parseInt(limitRaw, 10);
            if (!Number.isInteger(n) || n < 1 || n > 20) {
                alert("输入错误，请重新输入1~20之间的数字再试");
                return;
            }
            limit = n;
        }

        const data = { u: u, p: p, cn: cn, en: en, m: mode || 'both', n: limit };
        const params = new URLSearchParams(data).toString();
        
        // V11.4 核心改进：使用图书馆作为“数据锚点”，确保参数 100% 被脚本捕获并存储
        // 脚本会在图书馆加载的一瞬间保存参数并立即跳往登录页进行判断
        const baseUrl = "http://lib.ctgu.edu.cn/?";
        
        window.open(baseUrl + params, "_blank");
    }
</script>
</body>
</html>
